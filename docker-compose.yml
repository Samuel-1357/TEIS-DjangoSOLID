version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=tienda_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_password

  web_django:
    build: .
    # CAMBIO 1: Usamos Gunicorn en lugar de runserver
    # 'tienda_project' debe ser el nombre de la carpeta donde está tu wsgi.py
    command: gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DB_NAME=tienda_db
      - DB_USER=postgres
      - DB_PASSWORD=secret_password
      - DB_HOST=db
      - DB_PORT=5432
    # NOTA: Ya no hay sección 'ports' aquí. Django está aislado.

  pagos_flask:
    build: "./microservicio pagos"
    ports:
      - "5000:5000"
    depends_on:
      - db

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80" # Nginx es el único que expone el servicio a internet
    volumes:
      # Inyectamos nuestro archivo de configuración en el contenedor
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web_django
      - pagos_flask

volumes:
  postgres_data: